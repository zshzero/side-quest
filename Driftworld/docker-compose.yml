services:
  postgres:
    image: postgres:16
    container_name: driftworld-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: driftworld
      POSTGRES_PASSWORD: driftworld
      POSTGRES_DB: driftworld
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftworld -d driftworld"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
    name: driftworld-pgdata
